[project]
name = "winnow-seed-data"
version = "0.1.0"
description = "Synthetic emails and pre-recorded tier-2 LLM response fixtures for Winnow."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["winnow_seed_data"]
