services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: winnow
      POSTGRES_DB: winnow
    ports:
      - "5432:5432"
    volumes:
      - winnow_pg_data:/var/lib/postgresql/data
      - ./ops/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnow -d winnow"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  winnow_pg_data:
